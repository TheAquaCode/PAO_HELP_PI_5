<!DOCTYPE html>
<html>
<head>
    <title>Atlas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d0d0d; color: #00ff99; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }

        #sidebar {
            width: 200px; background: #111; border-right: 1px solid #1a1a1a;
            padding: 16px; display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto;
        }
        #sidebar h3 { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .stat-label { font-size: 11px; color: #555; margin-bottom: 2px; }
        .stat-value { font-size: 20px; color: #00ff99; }
        .stat-block { margin-bottom: 10px; }
        select {
            background: #1a1a1a; color: #00ff99; border: 1px solid #333;
            padding: 6px; font-family: monospace; width: 100%; cursor: pointer;
        }
        select:focus { outline: none; border-color: #00ff99; }
        #pi3-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ff4444; display: inline-block; margin-right: 6px;
        }
        #pi3-dot.online { background: #00ff99; }

        #main { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 10px; overflow: hidden; }
        #header { font-size: 18px; font-weight: bold; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        #chat { flex: 1; overflow-y: auto; padding: 10px; background: #0a0a0a; border: 1px solid #1a1a1a; }
        .user-msg { color: #ffffff; margin: 8px 0; }
        .ai-msg { color: #00ff99; margin: 8px 0; white-space: pre-wrap; }
        .timestamp { font-size: 10px; color: #333; display: block; margin-bottom: 2px; }
        #status { font-size: 11px; color: #555; min-height: 16px; }
        #input-row { display: flex; gap: 8px; }
        #msg {
            flex: 1; background: #1a1a1a; color: #00ff99;
            border: 1px solid #333; padding: 10px;
            font-family: monospace; font-size: 14px;
        }
        #msg:focus { outline: none; border-color: #00ff99; }
        button {
            background: #00ff99; color: #0d0d0d; border: none;
            padding: 10px 20px; font-family: monospace;
            font-weight: bold; cursor: pointer;
        }
        button:hover { background: #00cc77; }

        /* Architecture diagram panel */
        #arch-panel {
            border: 1px solid #1a1a1a; background: #0a0a0a;
            padding: 12px; margin-top: auto;
        }
        #arch-panel h3 { margin-bottom: 10px; }
        .arch-row {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: #555; margin-bottom: 4px;
        }
        .arch-node {
            border: 1px solid #333; padding: 4px 8px;
            font-size: 11px; color: #00ff99; background: #111;
            white-space: nowrap;
        }
        .arch-arrow {
            color: #333; font-size: 14px; transition: color 0.3s;
        }
        .arch-arrow.active { color: #00ff99; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .arch-indicator {
            width: 8px; height: 8px; border-radius: 50%;
            background: #333; display: inline-block; margin-left: 4px;
        }
        .arch-indicator.active {
            background: #00ff99;
            animation: blink 0.8s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div>
            <h3>Atlas</h3>
            <div style="font-size: 12px; color: #555;">AI Terminal v3</div>
        </div>
        <div>
            <h3>System - Pi 5</h3>
            <div class="stat-block">
                <div class="stat-label">CPU</div>
                <div class="stat-value" id="cpu">--%</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">RAM</div>
                <div class="stat-value" id="ram">--%</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">Temp</div>
                <div class="stat-value" id="temp">--°C</div>
            </div>
        </div>
        <div>
            <h3>Persona</h3>
            <select id="persona">
                <option value="assistant">Assistant</option>
                <option value="tutor">Tutor</option>
                <option value="coder">Coder</option>
            </select>
        </div>
        <div>
            <h3>Pi 3 Voice Node</h3>
            <div style="font-size: 12px; display: flex; align-items: center;">
                <span id="pi3-dot"></span>
                <span id="pi3-label">checking...</span>
            </div>
        </div>

        <!-- Architecture Diagram Panel -->
        <div id="arch-panel">
            <h3>Architecture</h3>
            <div class="arch-row">
                <span class="arch-node">Pi 3 Mic</span>
                <span class="arch-arrow" id="arrow1">→</span>
                <span class="arch-node">Whisper</span>
            </div>
            <div class="arch-row">
                <span class="arch-node">Whisper</span>
                <span class="arch-arrow" id="arrow2">→</span>
                <span class="arch-node">Pi 5 Flask</span>
                <span class="arch-indicator" id="voice-indicator"></span>
            </div>
            <div class="arch-row">
                <span class="arch-node">Pi 5 Flask</span>
                <span class="arch-arrow" id="arrow3">→</span>
                <span class="arch-node">Ollama</span>
            </div>
            <div class="arch-row">
                <span class="arch-node">RAG</span>
                <span class="arch-arrow" id="arrow4">→</span>
                <span class="arch-node">ChromaDB</span>
            </div>
            <div style="font-size: 10px; color: #333; margin-top: 8px;">
                <span class="arch-indicator" id="rag-status"></span>
                <span id="rag-label" style="margin-left: 4px;">RAG: checking...</span>
            </div>
        </div>
    </div>

    <div id="main">
        <div id="header">Atlas AI Terminal</div>
        <div id="chat"></div>
        <div id="status"></div>
        <div id="input-row">
            <input id="msg" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()"/>
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        let voiceActive = false;

        window.onload = async () => {
            const res = await fetch("/history");
            const data = await res.json();
            data.forEach(m => appendMessage(m.role, m.content, m.timestamp));
            updateStats();
            setInterval(updateStats, 3000);
            checkPi3();
            setInterval(checkPi3, 8000);
            checkRAG();
        };

        function appendMessage(role, content, timestamp) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = role === "user" ? "user-msg" : "ai-msg";
            const ts = timestamp ? `<span class="timestamp">${timestamp}</span>` : "";
            const prefix = role === "user" ? "> " : "Atlas: ";
            div.innerHTML = ts + prefix + content;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function setArchActive(active) {
            // Light up the arrows and indicator when traffic is flowing
            ["arrow1","arrow2","arrow3"].forEach(id => {
                document.getElementById(id).classList.toggle("active", active);
            });
            document.getElementById("voice-indicator").classList.toggle("active", active);
        }

        async function send(override) {
            const input = document.getElementById("msg");
            const msg = override || input.value.trim();
            if (!msg) return;
            input.value = "";
            const persona = document.getElementById("persona").value;

            appendMessage("user", msg);
            document.getElementById("status").textContent = "Atlas is thinking...";

            // Light up architecture arrows while generating
            setArchActive(true);

            const chat = document.getElementById("chat");
            const aiDiv = document.createElement("div");
            aiDiv.className = "ai-msg";
            aiDiv.textContent = "Atlas: ";
            chat.appendChild(aiDiv);

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg, persona: persona })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let full = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\\n").filter(l => l.startsWith("data: "));
                    for (const line of lines) {
                        const token = line.replace("data: ", "");
                        if (token === "[DONE]") break;
                        full += token;
                        aiDiv.textContent = "Atlas: " + full;
                        chat.scrollTop = chat.scrollHeight;
                    }
                }
            } catch (err) {
                aiDiv.textContent = "Atlas: [Error communicating with Ollama]";
            }

            setArchActive(false);
            document.getElementById("status").textContent = "";
        }

        async function updateStats() {
            try {
                const res = await fetch("/stats");
                const data = await res.json();
                document.getElementById("cpu").textContent = data.cpu + "%";
                document.getElementById("ram").textContent = data.ram + "%";
                document.getElementById("temp").textContent = data.temp + "°C";
            } catch {}
        }

        async function checkPi3() {
            try {
                const res = await fetch("/pi3-status");
                const data = await res.json();
                const dot = document.getElementById("pi3-dot");
                const label = document.getElementById("pi3-label");
                if (data.online) {
                    dot.classList.add("online");
                    label.textContent = "online";
                } else {
                    dot.classList.remove("online");
                    label.textContent = "offline";
                }
            } catch {
                document.getElementById("pi3-label").textContent = "offline";
            }
        }

        async function checkRAG() {
            try {
                const res = await fetch("/rag-status");
                const data = await res.json();
                const dot = document.getElementById("rag-status");
                const label = document.getElementById("rag-label");
                if (data.active) {
                    dot.style.background = "#00ff99";
                    label.textContent = "RAG: " + data.docs + " chunks";
                    document.getElementById("arrow4").classList.add("active");
                } else {
                    dot.style.background = "#ff4444";
                    label.textContent = "RAG: no notes";
                }
            } catch {
                document.getElementById("rag-label").textContent = "RAG: unavailable";
            }
        }
    </script>
</body>
</html>
